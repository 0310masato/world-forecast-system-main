name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/**
      - docs/**

jobs:
  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    env:
      HORMUZ_USE_MOCK: "true"
      HORMUZ_NEWS_USE_MOCK: "true"
      JAPAN_BOUND_TANKER_NAS_LOG_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Characterization smoke
        run: npm run test:characterization

      - name: Memory helper smoke
        run: npm run test:memory

      - name: Context pack builder smoke
        run: npm run test:context-pack

      - name: AI analysis job intake smoke
        run: npm run test:ai-analysis-job

      - name: AI analysis job result smoke
        run: npm run test:ai-analysis-job-result

      - name: Human review decision smoke
        run: npm run test:human-review-decision

      - name: Implementation proposal smoke
        run: npm run test:implementation-proposal

      - name: Task board handoff smoke
        run: npm run test:task-board-handoff
